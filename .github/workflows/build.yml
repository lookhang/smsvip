name: Build Debug APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licenses and install SDK packages
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Install Gradle 8.2
        run: |
          curl -sL https://services.gradle.org/distributions/gradle-8.2-bin.zip -o gradle.zip
          ls -l gradle.zip
          unzip -q gradle.zip
          echo "$(pwd)/gradle-8.2/bin" >> "$GITHUB_PATH"

      - name: Build with Gradle
        run: gradle :app:assembleDebug --no-daemon 2>&1 | tee build.log

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 1

      - name: Release APK to GitHub Releases
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --yes || true
          gh release create latest "app/build/outputs/apk/debug/app-debug.apk" \
            --title "Debug APK (latest)" \
            --notes "Auto-built from commit ${{ github.sha }}" \
            --prerelease

      - name: Report build error
        if: failure()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          python - <<'PY'
          import json, os, urllib.request, urllib.error, re
          data = open('build.log', encoding='utf-8', errors='replace').read()
          lines = data.splitlines()
          # Extract the "What went wrong" block (header -> next "Try:" or blank section)
          hits = []
          capture = False
          for ln in lines:
              if "* What went wrong:" in ln:
                  capture = True
                  hits.append(ln.strip())
                  continue
              if capture:
                  if ln.strip().startswith("Try:") or ln.strip().startswith("Get more help"):
                      break
                  hits.append(ln.strip())
          # Also grab explicit resolution failures
          for ln in lines:
              s = ln.strip()
              if s.startswith("> Could not resolve") or s.startswith("> Could not find") \
                 or s.startswith("> Could not determine") or s.startswith("Execution failed for"):
                  hits.append(s)
          focus = "\n".join(hits[:60])
          tail = data[-4000:]
          body = ("CI build failed.\n\n## Key error lines\n```\n" + focus +
                  "\n```\n\n## Tail of log\n```\n" + tail + "\n```")
          payload = json.dumps({"title": "CI build failure", "body": body}).encode('utf-8')
          req = urllib.request.Request(
              f"https://api.github.com/repos/{os.environ['REPO']}/issues",
              data=payload,
              headers={
                  "Authorization": "Bearer " + os.environ['GITHUB_TOKEN'],
                  "Accept": "application/vnd.github+json",
                  "Content-Type": "application/json",
                  "X-GitHub-Api-Version": "2022-11-28",
              },
              method="POST"
          )
          try:
              with urllib.request.urlopen(req) as r:
                  print("Issue created:", r.geturl())
          except urllib.error.HTTPError as e:
              print("Issue create failed:", e.code, e.read().decode()[:300])
          PY
