name: Build Debug APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licenses and install SDK packages
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Install Gradle 8.2
        run: |
          curl -sL https://services.gradle.org/distributions/gradle-8.2-bin.zip -o gradle.zip
          ls -l gradle.zip
          unzip -q gradle.zip
          echo "$(pwd)/gradle-8.2/bin" >> "$GITHUB_PATH"

      - name: Build with Gradle
        run: gradle :app:assembleDebug --no-daemon 2>&1 | tee build.log

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Report build error
        if: failure()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          python - <<'PY'
          import json, os, urllib.request, urllib.error
          data = open('build.log', encoding='utf-8', errors='replace').read()
          # keep the tail (most relevant) but cap size
          tail = data[-6000:]
          body = "CI build failed. Last part of build log:\n\n```\n" + tail + "\n```"
          payload = json.dumps({"title": "CI build failure", "body": body}).encode('utf-8')
          req = urllib.request.Request(
              f"https://api.github.com/repos/{os.environ['REPO']}/issues",
              data=payload,
              headers={
                  "Authorization": "Bearer " + os.environ['GITHUB_TOKEN'],
                  "Accept": "application/vnd.github+json",
                  "Content-Type": "application/json",
                  "X-GitHub-Api-Version": "2022-11-28",
              },
              method="POST"
          )
          try:
              with urllib.request.urlopen(req) as r:
                  print("Issue created:", r.geturl())
          except urllib.error.HTTPError as e:
              print("Issue create failed:", e.code, e.read().decode()[:300])
          PY
