name: Build Debug APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licenses and install SDK packages
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Install Gradle 8.2
        run: |
          curl -sL https://services.gradle.org/distributions/gradle-8.2-bin.zip -o gradle.zip
          ls -l gradle.zip
          unzip -q gradle.zip
          echo "$(pwd)/gradle-8.2/bin" >> "$GITHUB_PATH"

      - name: Build with Gradle
        run: gradle :app:assembleDebug --no-daemon 2>&1 | tee build.log

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 1

      - name: Release APK to GitHub Releases
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --yes || true
          gh release create latest "app/build/outputs/apk/debug/app-debug.apk" \
            --title "Debug APK (latest)" \
            --notes "Auto-built from commit ${{ github.sha }}" \
            --prerelease

      - name: Report build error (public release, readable without token)
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python - <<'PY'
          import os, subprocess, textwrap
          data = open('build.log', encoding='utf-8', errors='replace').read()
          # keep full but cap to 40000 chars to fit release body
          if len(data) > 40000:
              data = data[-40000:]
          # escape for JSON
          import json
          body = "CI build failed. Full build log:\n\n```\n" + data + "\n```"
          tag = "ci-error-" + os.environ.get('GITHUB_SHA', 'x')[:8]
          # delete previous same tag release if any
          subprocess.run(["gh", "release", "delete", tag, "--yes"],
                         env={**os.environ, "GH_TOKEN": os.environ["GH_TOKEN"]},
                         capture_output=True)
          r = subprocess.run(
              ["gh", "release", "create", tag, "--title", "CI Error " + tag,
               "--notes", body, "--prerelease"],
              env={**os.environ, "GH_TOKEN": os.environ["GH_TOKEN"]},
              capture_output=True, text=True)
          print("gh release create rc=", r.returncode)
          print(r.stdout[-500:], r.stderr[-500:])
          PY
